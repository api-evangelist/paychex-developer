  - aid: paychex-developer:paychex-workers-api
    name: Paychex Workers API
    description: The Paychex Workers API provides access to employee and contractor records inside a
      Paychex Flex company — including personal details, employment status, pay rates, work assignments,
      and lifecycle events such as hire and termination. Workers are addressed as a sub-resource of a
      company (`/companies/{companyId}/workers`).
