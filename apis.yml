    name: Paychex Payroll Companies API
    description: The Paychex Payroll Companies API exposes the list of payroll-bearing companies
      that a registered Paychex application has been granted access to, along with each company's
      configuration, pay components, deductions, earnings, and worksite data. It is the entry point
      to every other Paychex REST API — workers and time are scoped underneath a company resource.
