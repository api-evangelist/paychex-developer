  - aid: paychex-developer:paychex-time-api
    name: Paychex Time API
    description: The Paychex Time API enables third-party time and attendance systems to submit
      time entry, punch, and time-worked data for workers inside a Paychex Flex company so it can be
      consumed by Paychex Payroll. Operations are versioned under `/time/v1/` and are typically
      scoped per company and worker.
