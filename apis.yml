  - type: Features
    data:
      - name: Company-Scoped Access
        description: Every API call is scoped to a company resource that the registered application has
          been granted explicit access to, enforcing tenant isolation across Paychex Flex clients.
      - name: Worker Lifecycle Management
        description: List, retrieve, and update worker records — including personal information, work
          assignments, and pay rates — for hire-to-retire HR workflows.
      - name: Time Data Ingest
        description: Submit time entries, punches, and time-worked records from third-party time and
          attendance systems so they flow into Paychex Payroll processing.
      - name: OAuth 2.0 Client Credentials
        description: All APIs are protected by an OAuth 2.0 client_credentials flow tied to a registered
          Paychex partner or client application; there is no end-user OAuth dance.
      - name: Partner-Approved Integrations
        description: Production access is gated behind partner registration and Paychex approval; sandbox
          credentials are issued during integration review rather than via self-serve signup.
      - name: Paychex Flex Native
        description: APIs read and write against the same Paychex Flex platform used by ~800,000 payroll
          clients, so changes flow through the same payroll, HR, and benefits engines.
  - type: UseCases
    data:
      - name: HRIS and Payroll Sync
        description: Keep an external HRIS or workforce-management system in sync with Paychex Flex by
          listing companies, mirroring workers, and reconciling pay and assignment changes.
      - name: Time and Attendance Integration
        description: Push punches, time entries, and time-worked totals from third-party time tracking
          tools into Paychex Payroll so labor data drives paychecks automatically.
      - name: Onboarding Automation
        description: Trigger downstream onboarding workflows — provisioning, benefits, equipment — when a
          new worker is created or activated in Paychex Flex.
      - name: Embedded Payroll for Partners
        description: ISVs and vertical SaaS platforms surface Paychex payroll inside their own product,
          using the developer APIs to read companies and workers and feed payroll inputs.
      - name: Analytics and Workforce Reporting
        description: Pull worker, company, and time data into BI and people-analytics stacks for
          headcount, labor cost, and compliance reporting.
  - type: Integrations
    data:
      - name: Paychex Flex
        description: Native integration with Paychex Flex — the cloud HR, payroll, time, and benefits
          platform that the developer APIs sit on top of.
      - name: Paychex Time
        description: Native time and attendance product whose data model is exposed (and writable) via
          the Paychex Time API for third-party time vendors.
      - name: Paychex HR PEO
        description: Professional Employer Organization (PEO) co-employment services that share the same
          underlying worker and company records exposed via the developer APIs.
      - name: Paychex Marketplace
        description: Partner marketplace where vetted ISVs publish integrations built on the Paychex
          developer APIs.
      - name: Paycor (Acquired 2025)
        description: Paychex completed its $4.1B acquisition of Paycor in 2025, expanding the HCM
          surface area covered by the broader Paychex platform.
