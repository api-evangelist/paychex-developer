naftiko: 1.0.0-alpha2
info:
  label: Paychex Workers API — Workers
  description: 'Paychex Workers API — Workers. 2 operations. Lead operation: List
    Company Workers. Self-contained Naftiko capability covering the worker (employee
    and contractor) surface of Paychex Flex.'
  tags:
    - Paychex
    - Workers
    - HCM
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      PAYCHEX_API_KEY: PAYCHEX_API_KEY
capability:
  consumes:
    - type: http
      namespace: paychex-workers
      baseUri: https://api.paychex.com
      description: Paychex Workers API business capability. Self-contained, no shared
        references.
      resources:
        - name: companies-companyId-workers
          path: /companies/{companyId}/workers
          operations:
            - name: listcompanyworkers
              method: GET
              description: List Company Workers
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: companyId
                  in: path
                  type: string
                  description: Paychex Flex company identifier.
                  required: true
                - name: offset
                  in: query
                  type: integer
                - name: limit
                  in: query
                  type: integer
        - name: companies-companyId-workers-workerId
          path: /companies/{companyId}/workers/{workerId}
          operations:
            - name: getcompanyworker
              method: GET
              description: Get Company Worker
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: companyId
                  in: path
                  type: string
                  required: true
                - name: workerId
                  in: path
                  type: string
                  required: true
      authentication:
        type: bearer
        token: '{{env.PAYCHEX_API_KEY}}'
  exposes:
    - type: rest
      namespace: paychex-workers-rest
      port: 8080
      description: REST adapter for Paychex Workers.
      resources:
        - path: /v1/companies/{companyId}/workers
          name: companies-companyId-workers
          description: REST surface for company workers.
          operations:
            - method: GET
              name: listcompanyworkers
              description: List Company Workers
              call: paychex-workers.listcompanyworkers
              with:
                companyId: rest.companyId
                offset: rest.offset
                limit: rest.limit
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/companies/{companyId}/workers/{workerId}
          name: companies-companyId-workers-workerId
          description: REST surface for a single worker.
          operations:
            - method: GET
              name: getcompanyworker
              description: Get Company Worker
              call: paychex-workers.getcompanyworker
              with:
                companyId: rest.companyId
                workerId: rest.workerId
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: paychex-workers-mcp
      port: 9090
      transport: http
      description: MCP adapter for Paychex Workers.
      tools:
        - name: list-company-workers
          description: List Company Workers
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: paychex-workers.listcompanyworkers
          with:
            companyId: tools.companyId
            offset: tools.offset
            limit: tools.limit
          outputParameters:
            - type: object
              mapping: $.
        - name: get-company-worker
          description: Get Company Worker
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: paychex-workers.getcompanyworker
          with:
            companyId: tools.companyId
            workerId: tools.workerId
          outputParameters:
            - type: object
              mapping: $.
