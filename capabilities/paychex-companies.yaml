naftiko: 1.0.0-alpha2
info:
  label: Paychex Payroll Companies API — Companies
  description: 'Paychex Payroll Companies API — Companies. 2 operations. Lead operation:
    List Companies. Self-contained Naftiko capability covering the company discovery
    surface of Paychex Flex.'
  tags:
    - Paychex
    - Companies
    - Payroll
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      PAYCHEX_API_KEY: PAYCHEX_API_KEY
capability:
  consumes:
    - type: http
      namespace: paychex-companies
      baseUri: https://api.paychex.com
      description: Paychex Payroll Companies API business capability. Self-contained,
        no shared references.
      resources:
        - name: companies
          path: /companies
          operations:
            - name: listcompanies
              method: GET
              description: List Companies
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  description: Zero-based offset used for pagination.
                - name: limit
                  in: query
                  type: integer
                  description: Maximum number of records to return per page.
        - name: companies-companyId
          path: /companies/{companyId}
          operations:
            - name: getcompany
              method: GET
              description: Get Company by ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: companyId
                  in: path
                  type: string
                  description: Paychex Flex company identifier.
                  required: true
      authentication:
        type: bearer
        token: '{{env.PAYCHEX_API_KEY}}'
  exposes:
    - type: rest
      namespace: paychex-companies-rest
      port: 8080
      description: REST adapter for Paychex Companies. One Spectral-compliant resource
        per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/companies
          name: companies
          description: REST surface for companies.
          operations:
            - method: GET
              name: listcompanies
              description: List Companies
              call: paychex-companies.listcompanies
              with:
                offset: rest.offset
                limit: rest.limit
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/companies/{companyId}
          name: companies-companyId
          description: REST surface for a single company.
          operations:
            - method: GET
              name: getcompany
              description: Get Company by ID
              call: paychex-companies.getcompany
              with:
                companyId: rest.companyId
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: paychex-companies-mcp
      port: 9090
      transport: http
      description: MCP adapter for Paychex Companies. One tool per consumed operation,
        routed inline through this capability's consumes block.
      tools:
        - name: list-companies
          description: List Companies
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: paychex-companies.listcompanies
          with:
            offset: tools.offset
            limit: tools.limit
          outputParameters:
            - type: object
              mapping: $.
        - name: get-company
          description: Get Company by ID
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: paychex-companies.getcompany
          with:
            companyId: tools.companyId
          outputParameters:
            - type: object
              mapping: $.
