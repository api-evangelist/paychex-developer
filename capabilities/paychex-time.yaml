naftiko: 1.0.0-alpha2
info:
  label: Paychex Time API — Time Entries
  description: 'Paychex Time API — Time Entries. 1 operation. Lead operation:
    Submit Time Entries. Self-contained Naftiko capability for pushing punches and
    time-worked totals into Paychex Payroll.'
  tags:
    - Paychex
    - Time
    - Payroll
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      PAYCHEX_API_KEY: PAYCHEX_API_KEY
capability:
  consumes:
    - type: http
      namespace: paychex-time
      baseUri: https://api.paychex.com
      description: Paychex Time API business capability. Self-contained, no shared
        references.
      resources:
        - name: time-v1-timeentries
          path: /time/v1/timeentries
          operations:
            - name: createtimeentries
              method: POST
              description: Submit Time Entries
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON) — a TimeEntriesRequest payload.
                  required: true
      authentication:
        type: bearer
        token: '{{env.PAYCHEX_API_KEY}}'
  exposes:
    - type: rest
      namespace: paychex-time-rest
      port: 8080
      description: REST adapter for Paychex Time.
      resources:
        - path: /v1/time/timeentries
          name: time-v1-timeentries
          description: REST surface for time entry submission.
          operations:
            - method: POST
              name: createtimeentries
              description: Submit Time Entries
              call: paychex-time.createtimeentries
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: paychex-time-mcp
      port: 9090
      transport: http
      description: MCP adapter for Paychex Time.
      tools:
        - name: submit-time-entries
          description: Submit Time Entries
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: paychex-time.createtimeentries
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
